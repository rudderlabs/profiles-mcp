name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      warehouse:
        description: Warehouse to debug in pb mode
        required: true
        default: snowflake
        type: choice
        options:
          - snowflake
          - bigquery
          - databricks
          - redshift

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv pytest pytest-mock pandas snowflake-snowpark-python google-cloud-bigquery databricks-sql-connector redshift_connector boto3 pyyaml cryptography python-dotenv
          # Install helper libs if needed, or requirements.txt if it exists
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run Unit Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          uv run pytest

  integration-sdk-tests:
    name: Integration SDK Tests (${{ matrix.warehouse }})
    needs: unit-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        warehouse: [snowflake, bigquery, databricks, redshift]
        
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock pandas snowflake-snowpark-python google-cloud-bigquery databricks-sql-connector redshift_connector boto3 pyyaml cryptography python-dotenv
          # Install helper libs if needed
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run SDK Integration Tests
        env:
          SNOWFLAKE_CONFIG: ${{ secrets.SNOWFLAKE_CONFIG }}
          BIGQUERY_CONFIG: ${{ secrets.BIGQUERY_CONFIG }}
          DATABRICKS_CONFIG: ${{ secrets.DATABRICKS_CONFIG }}
          REDSHIFT_CONFIG: ${{ secrets.REDSHIFT_CONFIG }}
          USE_PB_QUERY: "false"
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          # Run only SDK integration classes for this warehouse.
          pytest tests/integration/test_warehouses_real.py -k "${{ matrix.warehouse }} and not PbQuery"

  integration-pb-tests:
    name: Integration PB Tests (${{ matrix.warehouse }})
    needs: unit-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        warehouse: [snowflake, bigquery, databricks, redshift]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock pandas snowflake-snowpark-python google-cloud-bigquery databricks-sql-connector redshift_connector boto3 pyyaml cryptography python-dotenv
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install pb CLI
        run: |
          pip install profiles-rudderstack==0.24.8

      - name: Run PB Integration Tests
        env:
          SNOWFLAKE_CONFIG: ${{ secrets.SNOWFLAKE_CONFIG }}
          BIGQUERY_CONFIG: ${{ secrets.BIGQUERY_CONFIG }}
          DATABRICKS_CONFIG: ${{ secrets.DATABRICKS_CONFIG }}
          REDSHIFT_CONFIG: ${{ secrets.REDSHIFT_CONFIG }}
          USE_PB_QUERY: "true"
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          # Run only pb integration classes for this warehouse.
          pytest tests/integration/test_warehouses_real.py -k "${{ matrix.warehouse }} and PbQuery"

  pb-diagnostics:
    name: PB Diagnostics (${{ inputs.warehouse }})
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      SNOWFLAKE_CONFIG: ${{ secrets.SNOWFLAKE_CONFIG }}
      BIGQUERY_CONFIG: ${{ secrets.BIGQUERY_CONFIG }}
      DATABRICKS_CONFIG: ${{ secrets.DATABRICKS_CONFIG }}
      REDSHIFT_CONFIG: ${{ secrets.REDSHIFT_CONFIG }}
      PYTHONPATH: ${{ github.workspace }}/src
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock pandas snowflake-snowpark-python google-cloud-bigquery databricks-sql-connector redshift_connector boto3 pyyaml cryptography python-dotenv
          pip install profiles-rudderstack==0.24.8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Generate redacted diagnostics
        env:
          TARGET_WAREHOUSE: ${{ inputs.warehouse }}
        run: |
          mkdir -p diagnostics
          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          import tempfile
          from pathlib import Path

          import yaml

          secret_map = {
              "snowflake": "SNOWFLAKE_CONFIG",
              "bigquery": "BIGQUERY_CONFIG",
              "databricks": "DATABRICKS_CONFIG",
              "redshift": "REDSHIFT_CONFIG",
          }

          warehouse = os.environ.get("TARGET_WAREHOUSE", "snowflake").strip().lower()
          secret_name = secret_map.get(warehouse)
          secret_value = os.environ.get(secret_name, "") if secret_name else ""

          diagnostics = {
              "warehouse": warehouse,
              "secret_name": secret_name,
              "secret_present": bool(secret_value),
              "pb_version": None,
              "siteconfig_path": None,
              "connection_name": f"{warehouse}_conn",
              "sanitized": {},
              "pb_query": {
                  "returncode": None,
                  "timeout": False,
                  "stderr_head": None,
                  "stdout_head": None,
              },
          }

          if not secret_value:
              Path("diagnostics/summary.json").write_text(json.dumps(diagnostics, indent=2))
              raise SystemExit(0)

          parsed = yaml.safe_load(secret_value) or {}

          if "connections" in parsed:
              first_name = next(iter(parsed["connections"].keys()))
              conn = parsed["connections"][first_name]
              target = conn.get("target", "dev")
              out = (conn.get("outputs") or {}).get(target, {})
          else:
              target = "dev"
              out = parsed

          conn_name = f"{warehouse}_conn"
          synthetic = {
              "connections": {
                  conn_name: {
                      "target": target,
                      "outputs": {target: out},
                  }
              }
          }

          with tempfile.NamedTemporaryFile(mode="w", suffix=".yaml", delete=False) as tmp:
              yaml.safe_dump(synthetic, tmp)
              siteconfig_path = tmp.name

          diagnostics["siteconfig_path"] = siteconfig_path

          pbv = subprocess.run(["pb", "version"], capture_output=True, text=True)
          diagnostics["pb_version"] = (pbv.stdout or pbv.stderr or "").splitlines()[:4]

          # Keep only non-sensitive metadata to avoid secret leakage.
          safe_keys = [
              "type",
              "account",
              "host",
              "project_id",
              "database",
              "dbname",
              "schema",
              "dataset",
              "warehouse",
              "role",
              "catalog",
              "http_endpoint",
              "region",
              "cluster_identifier",
              "workgroup_name",
              "target",
          ]
          sanitized = {k: out.get(k) for k in safe_keys if out.get(k) is not None}

          # Redact host/account style identifiers partially for safer artifact sharing.
          for key in ["account", "host", "project_id", "database", "dbname", "schema", "dataset", "catalog", "http_endpoint"]:
              value = sanitized.get(key)
              if isinstance(value, str) and value:
                  sanitized[key] = value[:3] + "***" + value[-3:] if len(value) > 8 else "***"

          diagnostics["sanitized"] = sanitized

          cmd = [
              "pb", "query", "SELECT 1", "-c", siteconfig_path,
              "-p", str(Path(".").resolve()),
              "--max_rows", "0", "--migrate_on_load"
          ]
          try:
              result = subprocess.run(cmd, capture_output=True, text=True, timeout=120)
              diagnostics["pb_query"]["returncode"] = result.returncode
              diagnostics["pb_query"]["stderr_head"] = (result.stderr or "").splitlines()[:20]
              diagnostics["pb_query"]["stdout_head"] = (result.stdout or "").splitlines()[:20]
          except subprocess.TimeoutExpired as exc:
              diagnostics["pb_query"]["timeout"] = True
              diagnostics["pb_query"]["stderr_head"] = (exc.stderr.decode("utf-8", errors="ignore") if isinstance(exc.stderr, bytes) else (exc.stderr or "")).splitlines()[:20]

          Path("diagnostics/summary.json").write_text(json.dumps(diagnostics, indent=2))
          PY

      - name: Upload diagnostics artifact
        uses: actions/upload-artifact@v4
        with:
          name: pb-diagnostics-${{ inputs.warehouse }}
          path: diagnostics/
